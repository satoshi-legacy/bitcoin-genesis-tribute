<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bitcoin Genesis Block Tribute</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff9c;
  font-family:monospace;
  overflow:hidden;
}
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
.container{
  max-width:900px;
  margin:auto;
  padding:40px;
  text-align:center;
}
.title{
  color:#f7931a;
  font-size:2.5em;
}
.avatar{
  display:block;
  margin:20px auto;
  width:140px;
  border-radius:50%;
  box-shadow:0 0 15px #000;
}
.terminal{
  background:#050505;
  border:1px solid #222;
  padding:20px;
  height:420px;
  overflow:auto;
  position:relative;
  z-index:1;  /* make sure it is above canvas */
}
.line{
  margin:6px 0;
}
button{
  display:block;
  margin:20px auto;
  padding:10px 18px;
  background:#f7931a;
  border:none;
  font-family:monospace;
  cursor:pointer;
}
button:hover{
  background:#ffaa33;
}
.footer{
  text-align:center;
  margin-top:20px;
  color:#777;
}
.coin{
  position:absolute;
  width:80px;
  height:80px;
  top:-100px;
  left:50%;
  margin-left:-40px;
  background:radial-gradient(circle at 30% 30%, #f7931a 0%, #ffb733 60%, #f7931a 100%);
  border-radius:50%;
  box-shadow:0 0 20px #f7931a, 0 0 40px #ffb733, 0 0 60px #f7931a inset;
  display:none;
  font-weight:bold;
  color:black;
  line-height:80px;
  text-align:center;
  font-size:16px;
  font-family:monospace;
  transition: transform 0.2s, box-shadow 0.2s;
  z-index:2; /* above terminal content */
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1 class="title">Bitcoin Block 0</h1>

<img class="avatar"
src="https://upload.wikimedia.org/wikipedia/commons/0/0d/Satoshi_Nakamoto.jpg">

<div class="terminal" id="terminal">
  <div class="coin" id="coin">50 BTC</div>
</div>

<button onclick="start()">Start Mining</button>

<div class="footer">
Genesis Block Tribute
</div>

</div>

<script>

/* MATRIX BACKGROUND */
const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")
canvas.height=window.innerHeight
canvas.width=window.innerWidth
const letters="01BITCOIN"
const fontSize=14
const columns=canvas.width/fontSize
const drops=[]
for(let x=0;x<columns;x++)drops[x]=1
function draw(){
  ctx.fillStyle="rgba(0,0,0,0.05)"
  ctx.fillRect(0,0,canvas.width,canvas.height)
  ctx.fillStyle="#0f0"
  ctx.font=fontSize+"px monospace"
  for(let i=0;i<drops.length;i++){
    const text=letters[Math.floor(Math.random()*letters.length)]
    ctx.fillText(text,i*fontSize,drops[i]*fontSize)
    if(drops[i]*fontSize>canvas.height && Math.random()>0.975)drops[i]=0
    drops[i]++
  }
}
setInterval(draw,35)

/* TERMINAL MINING */
const term=document.getElementById("terminal")
const coin=document.getElementById("coin")
function line(text){
  const div=document.createElement("div")
  div.className="line"
  div.textContent=text
  term.appendChild(div)
  term.scrollTop=term.scrollHeight
  // BOUNCE COIN on each new line
  if(coin.style.display==="block"){
    coin.style.transform="translateY(-20px) scale(1.2)"
    coin.style.boxShadow="0 0 40px #f7931a, 0 0 60px #ffb733, 0 0 80px #f7931a inset"
    setTimeout(()=>{coin.style.transform="translateY(0) scale(1)"; coin.style.boxShadow="0 0 20px #f7931a, 0 0 40px #ffb733, 0 0 60px #f7931a inset"},180)
  }
}
function start(){
  term.innerHTML=""
  coin.style.display="none"
  line("> initializing node...")
  line("> connecting to network...")
  line("> blockchain height: 0")
  line("> starting proof-of-work")
  setTimeout(hashAnimation,1500)
}

/* HASH BUILDING */
const finalHash="000000000019d6689c085ae165831e93"
function randomHex(){
  const chars="abcdef0123456789"
  let out=""
  for(let i=0;i<finalHash.length;i++)out+=chars[Math.floor(Math.random()*chars.length)]
  return out
}
function hashAnimation(){
  let i=0
  const interval=setInterval(()=>{
    let attempt=randomHex()
    line("> hash attempt: "+attempt)
    if(i<finalHash.length){
      let current=finalHash.substring(0,i+1)
      let fake=current+randomHex().substring(i+1)
      line("> "+fake)
      i++
    }else{
      clearInterval(interval)
      line("")
      line("> valid block discovered")
      line("> hash: "+finalHash)
      line("")
      line("> reading coinbase data...")
      setTimeout(showMessage,1200)
    }
  },350)
}

/* MESSAGE + COIN DISPLAY */
function showMessage(){
  line("> decoding hex payload...")
  line("> 5468652054696d65732030332f4a616e2f32303039...")
  setTimeout(()=>{
    line("")
    line("> The Times 03/Jan/2009 Chancellor on brink of second bailout for banks")
    line("")
    line("> genesis block mined")
    line("> welcome to bitcoin")
    // show 50 BTC coin
    coin.style.display="block"
  },1200)
}

</script>

</body>
</html>
