<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bitcoin Genesis Block Tribute</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #000;
      color: #00ff9c;
      font-family: "Courier New", monospace;
      font-size: 16px;
      overflow-x: hidden;
      position: relative;
      min-height: 100vh;
    }
    #matrix {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -2;
    }
    h1 {
      text-align: center;
      color: #f7931a;
      font-size: 2.5rem;
      margin-top: 20px;
      margin-bottom: 15px;
    }
    .terminal-container {
      display: flex;
      justify-content: center;
      flex-direction: column;
      align-items: center;
      padding: 0 15px;
    }
    .terminal {
      position: relative;
      width: 80%;
      max-width: 700px;
      height: 300px;
      background: #050505;
      border: 1px solid #111;
      border-radius: 4px;
      padding: 10px;
      overflow-y: auto;
      color: #00ff9c;
      margin-bottom: 10px;
    }
    .line {
      line-height: 1.4;
      white-space: pre-wrap;
    }
    #coin {
      position: absolute;
      top: -70px;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      height: 50px;
      background: radial-gradient(circle at 30% 30%, #f7931a, #c66e00);
      border-radius: 50%;
      box-shadow:
        0 0 15px #f7931a,
        0 0 30px rgba(247, 147, 26, 0.5);
      opacity: 0;
      transition: transform 0.2s ease;
      z-index: 2;
    }
    .bounce {
      animation: coinBounce 0.3s ease-in-out;
    }
    @keyframes coinBounce {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-6px) scale(1.05);
      }
    }
    button {
      display: block;
      margin: 25px auto 15px;
      padding: 10px 30px;
      background: #f7931a;
      color: #000;
      border: none;
      border-radius: 4px;
      font-family: monospace;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      font-weight: bold;
    }
    button:hover {
      background: #ffb040;
    }
    footer {
      text-align: center;
      color: #666;
      font-size: 0.9rem;
      margin-top: 20px;
    }
    #satoshi-image {
      display: none;
      margin: 20px auto 0;
      max-width: 100%;
    }
    #satoshi-image img {
      width: 180px;
      height: auto;
      border: 1px solid #00ff9c;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <!-- Matrix rain background -->
  <canvas id="matrix"></canvas>

  <h1>Bitcoin Block 0</h1>

  <div class="terminal-container">
    <div id="coin"></div>
    <div id="terminal" class="terminal"></div>
    <!-- Placeholder for your Satoshi image -->
    <div id="satoshi-image">
      <img src="your-satoshi-image.png" alt="Satoshi Nakamoto">
    </div>
  </div>

  <button id="startBtn">Start Mining</button>

  <footer>Genesis Block Tribute</footer>

  <script>
    // --- MATRIX RAIN --- //
    const matrix = document.getElementById("matrix");
    const ctxM = matrix.getContext("2d");
    matrix.width = window.innerWidth;
    matrix.height = window.innerHeight;

    const chars = "01BITCOIN";
    const fontSize = 14;
    const columns = Math.floor(matrix.width / fontSize);
    const drops = Array(columns).fill(1);

    function drawMatrix() {
      ctxM.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctxM.fillRect(0, 0, matrix.width, matrix.height);
      ctxM.fillStyle = "#00ff9c";
      ctxM.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctxM.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > matrix.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }
    setInterval(drawMatrix, 50);

    // --- TERMINAL + MINING LOGIC --- //
    const terminal = document.getElementById("terminal");
    const coin = document.getElementById("coin");
    const startBtn = document.getElementById("startBtn");
    const satoshiImage = document.getElementById("satoshi-image");

    const genesisTarget = "000000000019d6689c085ae165831e93";
    const coinbaseHex = "04ffff001d0104455468652054696d65732030332f4a616e2f32303039204368616e63656c6c6f72206f6e206272696e6b206f66207365636f6e64206261696c6f757420666f722062616e6b73";
    const genesisMessage = "The Times 03/Jan/2009 Chancellor on brink of second bailout for banks";

    let running = false;
    let hashStep = 0;
    const fakeHashes = [
      "000000000000000000000000000000fe",
      "000000000000000000000000000000fc",
      "000000000000000000000000000000f8",
      "000000000000000000000000000000f0",
      "000000000000000000000000000000e0",
      "000000000019d6689c085ae165831e93"
    ];

    function addLine(text) {
      const line = document.createElement("div");
      line.className = "line";
      line.textContent = text;
      terminal.appendChild(line);
      terminal.scrollTop = terminal.scrollHeight;

      if (coin.style.opacity === "1") {
        coin.classList.add("bounce");
        setTimeout(() => coin.classList.remove("bounce"), 300);
      }
    }

    function mineStep() {
      if (!running) return;

      if (hashStep === 0) {
        addLine("> initializing node...");
        setTimeout(() => addLine("> connecting to network..."), 800);
        setTimeout(() => addLine("> blockchain height: 0"), 1600);
        setTimeout(() => addLine("> starting proof-of-work"), 2400);

        setTimeout(() => {
          addLine(`> difficulty: 1`);
          setTimeout(() => {
            addLine(`> hash attempt 1: ${fakeHashes[0]}`);
            setTimeout(() => {
              addLine(`> hash attempt 2: ${fakeHashes[1]}`);
              setTimeout(() => {
                addLine(`> hash attempt 3: ${fakeHashes[2]}`);
                setTimeout(() => {
                  addLine(`> hash attempt 4: ${fakeHashes[3]}`);
                  setTimeout(() => {
                    addLine(`> hash attempt 5: ${fakeHashes[4]}`);
                    setTimeout(() => {
                      addLine(`> hash attempt 6: ${fakeHashes[5]}`);
                      setTimeout(() => {
                        addLine(`> coinbase (hex): ${coinbaseHex}`);
                        setTimeout(() => {
                          addLine(`> coinbase decoded: ${genesisMessage}`);
                          setTimeout(() => {
                            addLine("> genesis block mined");
                            setTimeout(() => {
                              addLine("> welcome to bitcoin");
                              coin.style.opacity = "1";
                              // Show your uploaded Satoshi image after Genesis block
                              satoshiImage.style.display = "block";
                            }, 600);
                          }, 600);
                        }, 600);
                      }, 600);
                    }, 600);
                  }, 600);
                }, 600);
              }, 600);
            }, 600);
          }, 600);
        }, 3200);
      }

      hashStep++;
    }

    startBtn.addEventListener("click", () => {
      if (running) return;
      running = true;

      // Reset terminal
      terminal.innerHTML = "";
      coin.style.opacity = "0";
      satoshiImage.style.display = "none";

      addLine("> Start Mining");
      setTimeout(mineStep, 400);
    });

    // Resize matrix canvas on window resize
    window.addEventListener("resize", () => {
      matrix.width = window.innerWidth;
      matrix.height = window.innerHeight;
    });
  </script>
</body>
</html>
