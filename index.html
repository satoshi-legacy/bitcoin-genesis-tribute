<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bitcoin Genesis Block Tribute</title>
<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
  font-family:monospace;
}
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
.container {
  max-width:900px;
  margin:auto;
  padding:40px;
  text-align:center;
  color:#f7931a;
}
.title {
  font-size:2.5em;
  margin-bottom:20px;
}
.terminal {
  background:#050505;
  border:1px solid #222;
  padding:20px;
  height:300px;
  overflow:auto;
  position:relative;
  margin-top:20px;
  color:#00ff9c;
}
.line {
  margin:4px 0;
}
button {
  display:block;
  margin:20px auto;
  padding:10px 16px;
  background:#f7931a;
  border:none;
  cursor:pointer;
}
button:hover { background:#ffaa33; }
.coin {
  position:absolute;
  width:80px;
  height:80px;
  top:-100px;
  left:50%;
  margin-left:-40px;
  background:radial-gradient(circle at 30% 30%, #f7931a 0%, #ffb733 60%, #f7931a 100%);
  border-radius:50%;
  box-shadow:0 0 20px #f7931a,0 0 40px #ffb733,0 0 60px #f7931a inset;
  display:none;
  font-weight:bold;
  color:black;
  line-height:80px;
  text-align:center;
  font-size:16px;
  transition:transform 0.2s,box-shadow 0.2s;
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>
<canvas id="hoodOutline" width="200" height="200" style="position:absolute; top:50px; left:50%; margin-left:-100px;"></canvas>

<div class="container">
<h1 class="title">Bitcoin Block 0</h1>

<div class="terminal" id="terminal">
  <div class="coin" id="coin">50 BTC</div>
</div>

<button onclick="start()">Start Mining</button>
<div class="footer">Genesis Block Tribute</div>
</div>

<script>
// ===== MATRIX RAIN =====
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");
canvas.height=window.innerHeight;
canvas.width=window.innerWidth;
const letters="01BITCOIN";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];
for(let i=0;i<columns;i++) drops[i]=1;

function drawMatrix(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#0f0";
  ctx.font=fontSize+"px monospace";
  for(let i=0;i<drops.length;i++){
    const text=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);
    if(drops[i]*fontSize>canvas.height && Math.random()>0.975) drops[i]=0;
    drops[i]++;
  }
}
setInterval(drawMatrix,35);

// ===== HOODED OUTLINE =====
const hoodCanvas=document.getElementById("hoodOutline");
const hoodCtx=hoodCanvas.getContext("2d");

function drawHoodOutline(){
  hoodCtx.clearRect(0,0,200,200);
  hoodCtx.strokeStyle="#00ff9c";
  hoodCtx.lineWidth=2;
  hoodCtx.beginPath();
  // simple hood shape
  hoodCtx.moveTo(50,20);
  hoodCtx.quadraticCurveTo(100,-20,150,20);
  hoodCtx.quadraticCurveTo(180,100,150,180);
  hoodCtx.lineTo(50,180);
  hoodCtx.quadraticCurveTo(20,100,50,20);
  hoodCtx.stroke();
  // face inner oval
  hoodCtx.beginPath();
  hoodCtx.ellipse(100,100,35,50,0,0,2*Math.PI);
  hoodCtx.stroke();
}
drawHoodOutline();

// ===== TERMINAL MINING =====
const term=document.getElementById("terminal");
const coin=document.getElementById("coin");

function line(text){
  const div=document.createElement("div");
  div.className="line";
  div.textContent=text;
  term.appendChild(div);
  term.scrollTop=term.scrollHeight;
  if(coin.style.display==="block"){
    coin.style.transform="translateY(-20px) scale(1.2)";
    setTimeout(()=>{coin.style.transform="translateY(0) scale(1)";},180);
  }
}

function start(){
  term.innerHTML="";
  coin.style.display="none";
  line("> initializing node...");
  line("> connecting to network...");
  line("> blockchain height: 0");
  line("> starting proof-of-work");
  setTimeout(hashAnimation,1500);
}

// ===== HASH SIMULATION =====
const finalHash="000000000019d6689c085ae165831e93";
function randomHex(){
  let out="";
  for(let i=0;i<finalHash.length;i++) out+="abcdef0123456789"[Math.floor(Math.random()*16)];
  return out;
}

function hashAnimation(){
  let i=0;
  const interval=setInterval(()=>{
    const attempt=randomHex();
    line("> hash attempt: "+attempt);
    if(i<finalHash.length){
      let current=finalHash.substring(0,i+1);
      let fake=current+randomHex().substring(i+1);
      line("> "+fake);
      i++;
    }else{
      clearInterval(interval);
      line("");
      line("> valid block discovered");
      line("> hash: "+finalHash);
      line("");
      line("> reading coinbase data...");
      setTimeout(showMessage,1200);
    }
  },350);
}

// ===== MESSAGE + COIN =====
function showMessage(){
  line("> decoding hex payload...");
  line("> 5468652054696d65732030332f4a616e2f32303039...");
  setTimeout(()=>{
    line("");
    line("> The Times 03/Jan/2009 Chancellor on brink of second bailout for banks");
    line("");
    line("> genesis block mined");
    line("> welcome to bitcoin");
    coin.style.display="block";
  },1200);
}
</script>
</body>
</html>
